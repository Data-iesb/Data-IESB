version: 0.2

env:
  variables:
    AWS_ACCOUNT_ID: "123456789012"           # ← Replace with your actual AWS account ID
    AWS_DEFAULT_REGION: "us-east-1"          # ← Replace with your AWS region
    ECR_REPO: "dataiesb-site"                # ← Optional: add these if not using config.py
    DOCKER_IMAGE: "dataiesb-site"
    CONTAINER_NAME: "dataiesb"

phases:
  pre_build:
    commands:
      - echo "🔑 Logging in to Amazon ECR..."
      - aws --version
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo "✅ Logged into ECR successfully."

  build:
    commands:
      - echo "🛠️  Building Docker image..."
      - docker build --no-cache -t $DOCKER_IMAGE -f docker/Dockerfile .
      - docker tag $DOCKER_IMAGE:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest

  post_build:
    commands:
      - echo "🚀 Pushing Docker image to ECR..."
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
      - echo "✅ Build and push completed."

artifacts:
  files:
    - '**/*'

