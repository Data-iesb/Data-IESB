<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Test</title>
    <link rel="stylesheet" href="./style/team-dynamic.css">
</head>
<body>
    <h1>Minimal Test</h1>
    
    <div id="dynamic-team-data">
        <div class="loading">Carregando dados da equipe...</div>
    </div>

    <script>
        console.log('Script starting...');
        
        // Simple test without the class
        async function loadTeam() {
            try {
                console.log('Fetching data...');
                const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/team');
                console.log('Response received:', response.status);
                
                const data = await response.json();
                console.log('Data parsed:', data);
                
                if (data.success) {
                    const container = document.getElementById('dynamic-team-data');
                    container.innerHTML = `<p>✅ Loaded ${data.data.length} team members!</p>`;
                    
                    // Show first member as test
                    if (data.data.length > 0) {
                        const firstMember = data.data[0];
                        container.innerHTML += `<p>First member: ${firstMember.name}</p>`;
                    }
                } else {
                    throw new Error('API returned error');
                }
            } catch (error) {
                console.error('Error:', error);
                const container = document.getElementById('dynamic-team-data');
                container.innerHTML = `<p>❌ Error: ${error.message}</p>`;
            }
        }
        
        // Load when DOM is ready
        document.addEventListener('DOMContentLoaded', loadTeam);
        console.log('Event listener added');
    </script>

</body>
</html>
