<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Data IESB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #D13F42, #DA2F35, #D13F42);
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        .login-title {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .warning-box {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border: 2px solid #f39c12;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .warning-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .warning-title {
            color: #d68910;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .warning-text {
            color: #856404;
            font-size: 14px;
            line-height: 1.5;
        }

        .email-example {
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 500;
            color: #2c3e50;
            margin-top: 8px;
            display: inline-block;
        }

        .login-button {
            background: linear-gradient(135deg, #D13F42, #DA2F35);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(209, 63, 66, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(209, 63, 66, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 30px;
            color: #95a5a6;
            font-size: 12px;
        }

        .footer-text a {
            color: #D13F42;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .login-title {
                font-size: 24px;
            }
            
            .logo-container img {
                width: 100px;
            }
        }

        /* Animation for container */
        .login-container {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="logo.png" alt="Data IESB Logo" onerror="this.src='https://d28lvm9jkyfotx.cloudfront.net/logo.png'">
        </div>
        
        <h1 class="login-title">Bem-vindo ao Data IESB</h1>
        <p class="login-subtitle">Faça login para acessar o painel administrativo</p>
        
        <div class="warning-box">
            <div class="warning-icon">⚠️</div>
            <div class="warning-title">IMPORTANTE - Acesso Restrito</div>
            <div class="warning-text">
                Este sistema é exclusivo para usuários com email institucional do IESB.
                <br><br>
                <strong>Utilize apenas emails com domínio:</strong>
                <div class="email-example">@iesb.edu.br</div>
            </div>
        </div>
        
        <button class="login-button" onclick="redirectToLogin()">
            <span class="loading-spinner" id="loadingSpinner"></span>
            <span id="buttonText">🔐 Entrar com IESB</span>
        </button>
        
        <div class="footer-text">
            Problemas com o login? <a href="contato.html">Entre em contato</a>
            <br><br>
            <a href="index.html">← Voltar para o site</a>
        </div>
    </div>

    <script>
        function redirectToLogin() {
            const button = document.querySelector('.login-button');
            const spinner = document.getElementById('loadingSpinner');
            const buttonText = document.getElementById('buttonText');
            
            // Show loading state
            button.disabled = true;
            spinner.style.display = 'inline-block';
            buttonText.textContent = 'Redirecionando...';
            
            // Add a small delay for better UX
            setTimeout(() => {
                window.location.replace("https://auth.dataiesb.com/oauth2/authorize?client_id=71am2v0jcp9uqpihrh9hjqtp6o&response_type=code&scope=email+openid&redirect_uri=https://dataiesb.com/callback.html");
            }, 800);
        }

        // Auto-redirect after 5 seconds if user doesn't click
        let autoRedirectTimer = setTimeout(() => {
            redirectToLogin();
        }, 5000);

        // Clear auto-redirect if user interacts
        document.querySelector('.login-button').addEventListener('click', () => {
            clearTimeout(autoRedirectTimer);
        });

        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add hover effect to warning box
            const warningBox = document.querySelector('.warning-box');
            warningBox.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.02)';
                this.style.transition = 'transform 0.3s ease';
            });
            
            warningBox.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
