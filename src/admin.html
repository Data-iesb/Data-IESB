<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin - Relatórios</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .user-info { font-size: 14px; color: #666; }
    .logout-btn { padding: 5px 10px; background: #dc3545; color: white; border: none; cursor: pointer; border-radius: 3px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin-right: 5px; }
    .btn-danger { background: #dc3545; }
    .btn-success { background: #28a745; }
    .btn-warning { background: #ffc107; color: #212529; }
    .btn-small { padding: 5px 10px; font-size: 12px; }
    .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .reports-section { margin-top: 40px; }
    .report-item { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
    .report-item.deleted { border-color: #dc3545; background-color: #f8f9fa; opacity: 0.7; }
    .report-title { font-weight: bold; margin-bottom: 5px; }
    .report-meta { font-size: 12px; color: #666; margin-bottom: 10px; }
    .report-actions { margin-top: 10px; }
    .confirm-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                     background: white; border: 2px solid #ccc; padding: 20px; border-radius: 5px; z-index: 1000; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
               background: rgba(0,0,0,0.5); z-index: 999; }
    .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
    .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { border-bottom-color: #007bff; color: #007bff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .deleted-label { color: #dc3545; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gerenciar Relatórios</h1>
    <div>
      <span class="user-info" id="userInfo">Carregando...</span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>
  
  <div id="message"></div>
  
  <h2>Criar Novo Relatório</h2>
  <form id="form">
    <div class="form-group">
      <label>Título:</label>
      <input type="text" id="titulo" required>
    </div>
    
    <div class="form-group">
      <label>Autor:</label>
      <input type="text" id="autor" required>
    </div>
    
    <div class="form-group">
      <label>Descrição:</label>
      <textarea id="descricao" rows="3" required></textarea>
    </div>
    
    <div class="form-group">
      <label>Arquivo Python:</label>
      <input type="file" id="arquivo" accept=".py" required>
    </div>
    
    <button type="submit">Criar Relatório</button>
  </form>

  <div class="reports-section">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('active')">Relatórios Ativos</div>
      <div class="tab" onclick="switchTab('deleted')">Relatórios Excluídos</div>
    </div>
    
    <div id="activeReports" class="tab-content active">
      <div id="activeReportsList">Carregando relatórios...</div>
    </div>
    
    <div id="deletedReports" class="tab-content">
      <div id="deletedReportsList">Clique na aba para carregar relatórios excluídos...</div>
    </div>
  </div>

  <!-- Confirmation Dialog -->
  <div class="overlay" id="overlay"></div>
  <div class="confirm-dialog" id="confirmDialog">
    <h3 id="confirmTitle">Confirmar Ação</h3>
    <p id="confirmMessage">Tem certeza que deseja realizar esta ação?</p>
    <p><strong id="reportToAction"></strong></p>
    <button id="confirmBtn" onclick="confirmAction()" class="btn-danger">Confirmar</button>
    <button onclick="cancelAction()">Cancelar</button>
  </div>

  <script>
    let currentUser = null;
    let authToken = null;
    let actionToConfirm = null;
    let currentTab = 'active';

    function showMessage(text, type) {
      const div = document.getElementById('message');
      div.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => div.innerHTML = '', 5000);
    }

    function logout() {
      localStorage.removeItem('idToken');
      window.location.href = 'login.html';
    }

    function checkAuth() {
      authToken = localStorage.getItem('idToken');
      if (!authToken) {
        window.location.href = 'login.html';
        return false;
      }

      try {
        const payload = JSON.parse(atob(authToken.split('.')[1]));
        currentUser = payload.email || payload.username;
        document.getElementById('userInfo').textContent = `Logado como: ${currentUser}`;
        return true;
      } catch (error) {
        console.error('Error decoding token:', error);
        logout();
        return false;
      }
    }

    function switchTab(tab) {
      // Update tab buttons
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${tab === 'active' ? '1' : '2'})`).classList.add('active');
      
      // Update tab content
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(tab === 'active' ? 'activeReports' : 'deletedReports').classList.add('active');
      
      currentTab = tab;
      
      // Load the appropriate reports for the selected tab
      if (tab === 'deleted') {
        loadDeletedReports();
      } else {
        loadReports();
      }
    }

    async function loadReports() {
      if (!authToken) return;

      if (currentTab === 'deleted') {
        loadDeletedReports();
        return;
      }

      try {
        const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const reports = await response.json();
          displayReports(reports);
        } else if (response.status === 401) {
          logout();
        } else {
          showMessage('Erro ao carregar relatórios', 'error');
        }
      } catch (error) {
        showMessage('Erro de conexão ao carregar relatórios', 'error');
      }
    }

    async function loadDeletedReports() {
      if (!authToken) return;

      try {
        const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports?deleted=true', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const reports = await response.json();
          displayDeletedReports(reports);
        } else if (response.status === 401) {
          logout();
        } else {
          showMessage('Erro ao carregar relatórios excluídos', 'error');
        }
      } catch (error) {
        showMessage('Erro de conexão ao carregar relatórios excluídos', 'error');
      }
    }

    function displayReports(reports) {
      const container = document.getElementById('activeReportsList');
      
      if (Object.keys(reports).length === 0) {
        container.innerHTML = '<p>Você ainda não possui relatórios ativos.</p>';
        return;
      }

      let html = '';
      for (const [id, report] of Object.entries(reports)) {
        html += `
          <div class="report-item">
            <div class="report-title">${report.titulo}</div>
            <div>Autor: ${report.autor}</div>
            <div>${report.descricao}</div>
            <div class="report-meta">
              Criado: ${new Date(report.created_at).toLocaleDateString('pt-BR')} | 
              Atualizado: ${new Date(report.updated_at).toLocaleDateString('pt-BR')}
            </div>
            <div class="report-actions">
              <button onclick="downloadReport('${id}')" class="btn-success btn-small">
                📥 Download
              </button>
              <button onclick="showSoftDeleteConfirm('${id}', '${report.titulo}')" class="btn-warning btn-small">
                🗂️ Ocultar
              </button>
              <button onclick="showDeleteConfirm('${id}', '${report.titulo}')" class="btn-danger btn-small">
                🗑️ Excluir Permanente
              </button>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function displayDeletedReports(reports) {
      const container = document.getElementById('deletedReportsList');
      
      if (Object.keys(reports).length === 0) {
        container.innerHTML = '<p>Nenhum relatório excluído.</p>';
        return;
      }

      let html = '';
      for (const [id, report] of Object.entries(reports)) {
        html += `
          <div class="report-item deleted">
            <div class="deleted-label">EXCLUÍDO</div>
            <div class="report-title">${report.titulo}</div>
            <div>Autor: ${report.autor}</div>
            <div>${report.descricao}</div>
            <div class="report-meta">
              Criado: ${new Date(report.created_at).toLocaleDateString('pt-BR')} | 
              Excluído: ${new Date(report.deleted_at).toLocaleDateString('pt-BR')}
            </div>
            <div class="report-actions">
              <button onclick="showRestoreConfirm('${id}', '${report.titulo}')" class="btn-success btn-small">
                ↩️ Restaurar
              </button>
              <button onclick="showDeleteConfirm('${id}', '${report.titulo}')" class="btn-danger btn-small">
                🗑️ Excluir Permanente
              </button>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    async function downloadReport(reportId) {
      if (!authToken) {
        logout();
        return;
      }

      try {
        const response = await fetch(`https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports/${reportId}/download`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (response.ok) {
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `report_${reportId}.py`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
          showMessage('Download iniciado!', 'success');
        } else if (response.status === 401) {
          logout();
        } else {
          showMessage('Erro ao fazer download do relatório', 'error');
        }
      } catch (error) {
        showMessage('Erro de conexão ao fazer download', 'error');
      }
    }

    function showSoftDeleteConfirm(reportId, reportTitle) {
      actionToConfirm = { type: 'soft_delete', id: reportId };
      document.getElementById('confirmTitle').textContent = 'Ocultar Relatório';
      document.getElementById('confirmMessage').textContent = 'Tem certeza que deseja ocultar este relatório? Ele poderá ser restaurado posteriormente.';
      document.getElementById('reportToAction').textContent = reportTitle;
      document.getElementById('confirmBtn').textContent = 'Sim, Ocultar';
      document.getElementById('confirmBtn').className = 'btn-warning';
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('confirmDialog').style.display = 'block';
    }

    function showDeleteConfirm(reportId, reportTitle) {
      actionToConfirm = { type: 'permanent_delete', id: reportId };
      document.getElementById('confirmTitle').textContent = 'Excluir Permanentemente';
      document.getElementById('confirmMessage').textContent = 'ATENÇÃO: Esta ação não pode ser desfeita! O relatório será excluído permanentemente.';
      document.getElementById('reportToAction').textContent = reportTitle;
      document.getElementById('confirmBtn').textContent = 'Sim, Excluir';
      document.getElementById('confirmBtn').className = 'btn-danger';
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('confirmDialog').style.display = 'block';
    }

    function showRestoreConfirm(reportId, reportTitle) {
      actionToConfirm = { type: 'restore', id: reportId };
      document.getElementById('confirmTitle').textContent = 'Restaurar Relatório';
      document.getElementById('confirmMessage').textContent = 'Tem certeza que deseja restaurar este relatório?';
      document.getElementById('reportToAction').textContent = reportTitle;
      document.getElementById('confirmBtn').textContent = 'Sim, Restaurar';
      document.getElementById('confirmBtn').className = 'btn-success';
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('confirmDialog').style.display = 'block';
    }

    function cancelAction() {
      actionToConfirm = null;
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('confirmDialog').style.display = 'none';
    }

    async function confirmAction() {
      if (!actionToConfirm || !authToken) {
        cancelAction();
        return;
      }

      try {
        let response;
        const { type, id } = actionToConfirm;

        if (type === 'soft_delete') {
          response = await fetch(`https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports/${id}`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (response.ok) {
            showMessage('Relatório ocultado com sucesso!', 'success');
          }
        } else if (type === 'restore') {
          response = await fetch(`https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports/${id}/restore`, {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (response.ok) {
            showMessage('Relatório restaurado com sucesso!', 'success');
          }
        } else if (type === 'permanent_delete') {
          response = await fetch(`https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports/${id}?permanent=true`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (response.ok) {
            showMessage('Relatório excluído permanentemente!', 'success');
          }
        }

        if (response && response.status === 401) {
          logout();
        } else if (response && !response.ok) {
          const errorText = await response.text();
          showMessage(`Erro: ${errorText}`, 'error');
        } else {
          // Reload the appropriate tab based on current view
          if (currentTab === 'deleted') {
            loadDeletedReports();
          } else {
            loadReports();
          }
        }
      } catch (error) {
        showMessage('Erro de conexão', 'error');
      }

      cancelAction();
    }

    document.getElementById('form').onsubmit = async function(e) {
      e.preventDefault();
      
      if (!authToken) {
        logout();
        return;
      }

      const formData = new FormData();
      formData.append('titulo', document.getElementById('titulo').value);
      formData.append('autor', document.getElementById('autor').value);
      formData.append('descricao', document.getElementById('descricao').value);
      formData.append('main', document.getElementById('arquivo').files[0]);

      try {
        const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/reports', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`
          },
          body: formData
        });

        if (response.ok) {
          const result = await response.json();
          showMessage(`Relatório criado com sucesso! Arquivo salvo em: s3://dataiesb-reports`, 'success');
          document.getElementById('form').reset();
          loadReports();
        } else if (response.status === 401) {
          logout();
        } else {
          const error = await response.text();
          showMessage(`Erro ao criar relatório: ${error}`, 'error');
        }
      } catch (error) {
        showMessage('Erro de conexão ao criar relatório', 'error');
      }
    };

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      if (checkAuth()) {
        loadReports();
      }
    });
  </script>
</body>
</html>
