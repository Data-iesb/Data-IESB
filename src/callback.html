<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando - Data IESB</title>
    <link rel="stylesheet" href="./style/home.css">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center;">
        <div>
            <h2>Processando sua solicitação...</h2>
            <p id="status">Aguarde enquanto processamos seu login.</p>
            <div style="margin: 20px 0;">
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Handle OAuth callback from Cognito
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const statusElement = document.getElementById('status');

        if (error) {
            statusElement.innerHTML = `<span style="color: red;">Erro: ${error}</span><br><a href="index.html">Voltar ao início</a>`;
        } else if (code) {
            // Success - user completed login, now exchange code for tokens
            statusElement.innerHTML = `<span style="color: green;">✅ Login realizado com sucesso!</span><br>Processando tokens...`;
            
            // Exchange code for tokens
            exchangeCodeForTokens(code);
        } else {
            statusElement.innerHTML = `<span style="color: orange;">Nenhum código de autorização encontrado.</span><br><a href="index.html">Voltar ao início</a>`;
        }

        async function exchangeCodeForTokens(authCode) {
            try {
                statusElement.innerHTML = `<span style="color: blue;">🔄 Trocando código por tokens...</span>`;
                
                // Call your backend to exchange the code for tokens
                const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/dataiesb-auth/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        code: authCode,
                        redirect_uri: 'https://dataiesb.com/callback.html'
                    })
                });

                if (response.ok) {
                    const tokenData = await response.json();
                    
                    if (tokenData.id_token) {
                        // Store the actual token from Cognito
                        localStorage.setItem('idToken', tokenData.id_token);
                        localStorage.setItem('cognitoAuth', 'true');
                        
                        // Try to decode the token to get user info
                        try {
                            const payload = JSON.parse(atob(tokenData.id_token.split('.')[1]));
                            const userEmail = payload.email || payload.username || 'user@iesb.edu.br';
                            statusElement.innerHTML = `<span style="color: green;">✅ Login realizado como ${userEmail}!</span><br>Redirecionando para admin...`;
                        } catch (e) {
                            statusElement.innerHTML = `<span style="color: green;">✅ Tokens obtidos com sucesso!</span><br>Redirecionando para admin...`;
                        }
                        
                        // Redirect to admin page after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 2000);
                    } else {
                        throw new Error('No ID token received');
                    }
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to exchange code for tokens');
                }
            } catch (error) {
                console.error('Error exchanging code for tokens:', error);
                statusElement.innerHTML = `<span style="color: red;">❌ Erro no login: ${error.message}</span><br>Tentando método alternativo...`;
                
                // Fallback: try to get user info directly from Cognito
                setTimeout(() => {
                    tryDirectCognitoUserInfo(authCode);
                }, 2000);
            }
        }

        async function tryDirectCognitoUserInfo(authCode) {
            try {
                statusElement.innerHTML = `<span style="color: orange;">🔄 Tentando obter informações do usuário...</span>`;
                
                // Try to exchange code directly with Cognito
                const tokenResponse = await fetch('https://auth.dataiesb.com/oauth2/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: '71am2v0jcp9uqpihrh9hjqtp6o',
                        code: authCode,
                        redirect_uri: 'https://dataiesb.com/callback.html'
                    })
                });

                if (tokenResponse.ok) {
                    const tokens = await tokenResponse.json();
                    
                    if (tokens.id_token) {
                        // Store the real token
                        localStorage.setItem('idToken', tokens.id_token);
                        localStorage.setItem('cognitoAuth', 'true');
                        
                        // Decode to show user email
                        try {
                            const payload = JSON.parse(atob(tokens.id_token.split('.')[1]));
                            const userEmail = payload.email || payload.username || 'user@iesb.edu.br';
                            statusElement.innerHTML = `<span style="color: green;">✅ Login direto realizado como ${userEmail}!</span><br>Redirecionando...`;
                        } catch (e) {
                            statusElement.innerHTML = `<span style="color: green;">✅ Login direto realizado!</span><br>Redirecionando...`;
                        }
                        
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 2000);
                        return;
                    }
                }
                
                // If direct Cognito call fails, use fallback
                throw new Error('Direct Cognito token exchange failed');
                
            } catch (error) {
                console.error('Direct Cognito call failed:', error);
                statusElement.innerHTML = `<span style="color: orange;">⚠️ Método direto falhou, usando fallback...</span>`;
                
                setTimeout(() => {
                    createTemporaryToken(authCode);
                }, 1000);
            }
        }

        async function createTemporaryToken(authCode) {
            try {
                statusElement.innerHTML = `<span style="color: orange;">⚠️ Usando método alternativo...</span>`;
                
                // Try to get user info from Cognito using the auth code
                let userEmail = 'user@iesb.edu.br'; // Default fallback
                
                try {
                    // Attempt to decode user info from the URL or previous storage
                    const storedUserInfo = localStorage.getItem('pendingUserInfo');
                    if (storedUserInfo) {
                        const userInfo = JSON.parse(storedUserInfo);
                        userEmail = userInfo.email || userEmail;
                        localStorage.removeItem('pendingUserInfo'); // Clean up
                    }
                } catch (e) {
                    console.log('No stored user info found, using default');
                }
                
                // Create a mock token for development/testing with actual user email
                const mockPayload = {
                    sub: 'user-' + Date.now(),
                    email: userEmail,
                    username: userEmail,
                    exp: Math.floor(Date.now() / 1000) + 3600, // 1 hour from now
                    iat: Math.floor(Date.now() / 1000),
                    auth_code: authCode,
                    'cognito:username': userEmail.split('@')[0]
                };
                
                const mockToken = btoa(JSON.stringify(mockPayload));
                const fullMockToken = `header.${mockToken}.signature`;
                
                localStorage.setItem('idToken', fullMockToken);
                localStorage.setItem('cognitoAuth', 'true');
                localStorage.setItem('authCode', authCode);
                
                statusElement.innerHTML = `<span style="color: green;">✅ Login realizado como ${userEmail}!</span><br>Redirecionando...`;
                
                // Redirect to admin page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 2000);
            } catch (error) {
                console.error('Error creating temporary token:', error);
                statusElement.innerHTML = `<span style="color: red;">❌ Erro crítico: ${error.message}</span><br><a href="login.html">Tentar novamente</a>`;
            }
        }
    </script>
</body>
</html>
