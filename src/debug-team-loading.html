<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Team Loading</title>
    <link rel="stylesheet" href="./style/home.css"> 
    <link rel="stylesheet" href="./style/team-dynamic.css">
    <style>
        body { padding: 20px; font-family: Arial, sans-serif; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Debug - Team Loading</h1>
    
    <div class="debug">
        <h3>JavaScript Console Output:</h3>
        <p>Open browser dev tools (F12) to see console logs</p>
    </div>
    
    <div class="debug">
        <h3>API Test:</h3>
        <button onclick="testAPI()">Test API Directly</button>
        <div id="api-result"></div>
    </div>
    
    <div class="debug">
        <h3>Team Container:</h3>
        <div id="dynamic-team-data" style="border: 2px solid #ccc; min-height: 100px; padding: 20px;">
            <div class="loading">Carregando dados da equipe...</div>
        </div>
    </div>

    <script>
        // Test API directly
        async function testAPI() {
            const resultDiv = document.getElementById('api-result');
            try {
                resultDiv.innerHTML = '<p>Testing API...</p>';
                const response = await fetch('https://hewx1kjfxh.execute-api.us-east-1.amazonaws.com/prod/team');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <p class="success">✅ API Response:</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ API Error: ${error.message}</p>`;
            }
        }
        
        // Log when script loads
        console.log('Debug script loaded');
        
        // Test if team data API script is loaded
        setTimeout(() => {
            if (typeof TeamDataManager !== 'undefined') {
                console.log('✅ TeamDataManager is available');
            } else {
                console.log('❌ TeamDataManager is NOT available');
            }
        }, 1000);
    </script>
    
    <!-- Team Data JavaScript -->
    <script src="./js/team-data-api.js?v=2025081114"></script>

</body>
</html>
