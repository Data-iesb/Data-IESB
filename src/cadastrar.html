<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar - Data IESB</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .redirect-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D13F42;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #D13F42;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">🎓 Data IESB</div>
        <div class="spinner"></div>
        <div class="message">Redirecionando para cadastro seguro...</div>
    </div>
    
    <script>
        // Immediate redirect to Cognito signup
        window.location.replace("https://auth.dataiesb.com/oauth2/authorize?client_id=71am2v0jcp9uqpihrh9hjqtp6o&response_type=code&scope=email+openid&redirect_uri=https://dataiesb.com/admin.html&signup=true");
    </script>
</body>
</html>
